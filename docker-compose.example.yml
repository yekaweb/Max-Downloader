version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: dlbot_postgres
    environment:
      POSTGRES_DB: dlbot_db
      POSTGRES_USER: dlbot_user
      POSTGRES_PASSWORD: YOUR_POSTGRES_PASSWORD
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: dlbot_redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  dlbot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dlbot_bot
    command: python main.py
    environment:
      BOT_TOKEN: ${BOT_TOKEN}
      DB_HOST: postgres
      DB_USER: dlbot_user
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: dlbot_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      PYROGRAM_APP_ID: ${PYROGRAM_APP_ID}
      PYROGRAM_APP_HASH: ${PYROGRAM_APP_HASH}
    volumes:
      - .:/app
      - temp_downloads:/app/temp_downloads
      - cached_files:/app/cached_files
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  web_panel:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dlbot_web_panel
    command: uvicorn web.app:app --host 0.0.0.0 --port 8000 --reload
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
      JWT_SECRET_KEY: ${JWT_SECRET_KEY}
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  temp_downloads:
  cached_files:
